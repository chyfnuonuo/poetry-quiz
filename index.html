        let fhlTimerInterval = null;
        let fhlTimeLeft = 0;
        let fhlTotalSeconds = 20;
        let fhlRound = 1;
        let fhlBest = 0;

        function startFHLTimer(seconds = 20) {
            if (fhlTimerInterval) {
                clearInterval(fhlTimerInterval);
            }
            fhlTimeLeft = seconds;
            fhlTotalSeconds = seconds;
            updateFHLTimerDisplay();
            fhlTimerInterval = setInterval(() => {
                fhlTimeLeft--;
                updateFHLTimerDisplay();
                if (fhlTimeLeft <= 0) {
                    clearInterval(fhlTimerInterval);
                    fhlTimerInterval = null;
                    fhlEndRound();
                }
            }, 1000);
        }

        function updateFHLTimerDisplay() {
            const tf = document.getElementById('ftf');
            const tt = document.getElementById('ftt');
            if (tf && tt) {
                tf.style.width = (fhlTimeLeft / fhlTotalSeconds * 100) + '%';
                tt.textContent = fhlTimeLeft + 's';
                if (fhlTimeLeft <= 5) {
                    tf.classList.add('warn');
                }
                if (fhlTimeLeft <= 2) {
                    tf.classList.add('danger');
                    tt.classList.add('warn');
                }
            }
        }

        function fhlCheck() {
            const input = document.getElementById('fi');
            if (!input || input.disabled) return;
            const inp = input.value.trim();
            if (!inp) {
                fhlEndRound();
                return;
            }
            const tok = window._fhlToken;
            if (inp.indexOf(tok) === -1) {
                const ff = document.getElementById('ff');
                if (ff) {
                    ff.classList.add('on', 'no');
                    ff.innerHTML = '❌ 诗句中必须包含"' + tok + '"字！';
                }
                setTimeout(() => fhlEndRound(), 1500);
                return;
            }
            const matches = FHLIndex[tok] || [];
            let found = null;
            const cleanedInp = inp.replace(/[，。？！、；：""''【】《》（）\s]/g, '');
            for (let i = 0; i < matches.length; i++) {
                const cleanedMatch = matches[i].poem.replace(/[，。？！、；：""''【】《》（）\s]/g, '');
                if (cleanedInp === cleanedMatch ||
                    (cleanedInp.length >= 3 && cleanedMatch.indexOf(cleanedInp) !== -1)) {
                    found = matches[i];
                    break;
                }
            }
            if (!found) {
                const ff = document.getElementById('ff');
                if (ff) {
                    ff.classList.add('on', 'no');
                    ff.innerHTML = '❌ 未在诗词库中匹配到';
                }
                setTimeout(() => fhlEndRound(), 1500);
                return;
            }
            for (let i = 0; i < feihuaUsed.length; i++) {
                const used = feihuaUsed[i].poem || feihuaUsed[i];
                if (used.replace(/[，。？！、；：""''【】《》（）\s]/g, '') === found.poem.replace(/[，。？！、；：""''【】《》（）\s]/g, '')) {
                    const ff = document.getElementById('ff');
                    if (ff) {
                        ff.classList.add('on', 'no');
                        ff.innerHTML = '🔄 这句已经说过了！';
                    }
                    setTimeout(() => fhlEndRound(), 1500);
                    return;
                }
            }
            feihuaUsed.push(found);
            const ff = document.getElementById('ff');
            if (ff) {
                ff.classList.add('on', 'ok');
                ff.innerHTML = '✅ ' + (found.source || '') + ' · ' + found.author + ' — "' + found.poem + '"';
            }
            const fused = document.getElementById('fused');
            if (fused) {
                fused.innerHTML = '<div style="font-size:.85rem;color:#666;margin-top:8px">已接 ' + feihuaUsed.length + ' 句</div>' +
                    feihuaUsed.map((u, i) => '<div style="font-family:var(--fd);font-size:.85rem;text-align:center;padding:2px 0">' + (i + 1) + '. ' + (u.poem || u) + ' <span style="font-size:.7rem;color:#999">——' + (u.author || '') + '</span></div>').join('');
            }
            input.value = '';
            input.focus();
            if (fhlTimerInterval) {
                clearInterval(fhlTimerInterval);
            }
            startFHLTimer();
        }

        function fhlEndRound() {
            if (fhlTimerInterval) {
                clearInterval(fhlTimerInterval);
                fhlTimerInterval = null;
            }
            const input = document.getElementById('fi');
            if (input) {
                input.disabled = true;
            }
            const fs = document.getElementById('fs');
            if (fs) {
                fs.style.display = 'none';
            }
            const ff = document.getElementById('ff');
            if (ff && !ff.classList.contains('ok')) {
                ff.classList.add('on', 'no');
                ff.innerHTML = '⏰ 时间到！本轮接诗 ' + feihuaUsed.length + ' 句';
            }
            const n = feihuaUsed.length;
            if (n > fhlBest) {
                fhlBest = n;
            }
            const fbs = document.getElementById('fbs');
            if (fbs) {
                fbs.style.display = 'block';
                fbs.textContent = '最佳：' + fhlBest + ' 句';
            }
            const fu = document.getElementById('fu');
            if (fu) {
                fu.style.display = 'block';
            }
            const tok = window._fhlToken;
            let matches = getUnusedPoems(tok);
            matches = matches.filter(m => {
                const poem = typeof m === 'string' ? m : m.poem;
                return poem.indexOf(tok) !== -1;
            });
            const fud = document.getElementById('fud');
            if (fud) {
                fud.innerHTML = '<div style="font-size:.85rem;color:#666;margin-bottom:8px">含"' + tok + '"未用的诗句（' + matches.length + '句）：</div>' +
                    matches.slice(0, 15).map(m => '<div style="font-family:var(--fd);font-size:.85rem;text-align:center;padding:2px 0">' + (m.poem || m) + ' <span style="font-size:.7rem;color:#999">——' + (m.author || '') + (m.source ? '《' + m.source + '》' : '') + '</span></div>').join('');
            }
        }

        }

        function nextQ() {
            // 恢复"下一题"按钮的正确处理函数（防止被错题练习污染）
            var nbBtn = document.getElementById('nb');
            if (nbBtn) nbBtn.onclick = nextQ;
            currentQuestionIndex++;
            if (currentQuestionIndex >= currentQuestions.length) {
                endGame();
                return;
            }
            const q = currentQuestions[currentQuestionIndex];
            const qzNum = document.getElementById('qz-num');
            const qzScore = document.getElementById('qz-score');
            const qt = document.getElementById('qt');
            const qs = document.getElementById('qs');
            const qb = document.getElementById('qb');
            const nb = document.getElementById('nb');
            const tf = document.getElementById('tf');
            const tt = document.getElementById('tt');
            const fb = document.getElementById('fb');
            const qc = document.getElementById('qc');
            if (qzNum) qzNum.textContent = '第 ' + (currentQuestionIndex + 1) + ' 题';
            if (qzScore) qzScore.textContent = currentScore + ' 分';
            if (qt) qt.innerHTML = '<span>' + (q.hint || '') + '</span>';
            if (qs) qs.textContent = q.question;
            if (nb) nb.style.display = 'none';
            if (tf) {
                tf.style.width = '100%';
                tf.classList.remove('warn', 'danger');
            }
            if (tt) {
                tt.textContent = '';
                tt.classList.remove('warn');
            }
            if (fb) {
                fb.classList.remove('on', 'ok', 'no');
                fb.innerHTML = '';
            }
            if (qc) {
                qc.classList.remove('qc-ok', 'qc-no');
            }
            if (q.type === 'situational') {
                if (qb) {
                    qb.innerHTML = '<div style="background:rgba(139,115,85,0.08);padding:12px 16px;border-radius:8px;margin-bottom:8px;font-size:0.95rem;line-height:1.7;color:var(--tl)">' + q.question + '</div><input class="input" id="ai" placeholder="请输入对应诗句..." autocomplete="off"><button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="submitS()">提交</button>';
                }
                startTimer(q.time);
            } else if (q.type === 'completion') {
                if (qb) {
                    qb.innerHTML = '<input class="input" id="ai" placeholder="语音或打字输入..." autocomplete="off"><div class="vhint">点键盘 🎤 语音输入</div><button class="btn btn-secondary" onclick="submitA()">提交</button>';
                }
                startTimer(q.time);
            } else if (q.type === 'literature') {
                if (qb) {
                    qb.innerHTML = '<div class="opts">' + q.options.map((o, i) => '<div class="opt-btn" onclick="submitO(' + i + ')">' + o + '</div>').join('') + '</div>';
                }
                startTimer(q.time);
            } else if (q.type === 'grid') {
                const gridChars = q.grid;
                const gridSize = gridChars.length <= 9 ? 3 : 4;
                if (qb) {
                    let html = '<div class="gp" id="gpv"></div><div class="grid">';
                    for (let i = 0; i < gridChars.length; i++) {
                        html += '<div class="gc" onclick="pickG(' + i + ')">' + gridChars[i] + '</div>';
                    }
                    html += '</div><button class="btn btn-outline" style="margin:10px auto;width:auto" onclick="clearG()">清除重选</button>';
                    qb.innerHTML = html;
                }
                window._gridChars = gridChars;
                window._gridAns = q.answer;
                window._gridPicked = [];
                startTimer(q.time);
            }
        }

        function submitA(timeout) {
            clearTimer();
            const inp = document.getElementById('ai');
            const ua = inp ? inp.value.trim() : '';
            const q = currentQuestions[currentQuestionIndex];
            const norm = s => s.replace(/[，。？！、；：""''【】《》（）\s,\.\?!;:'"()\[\]{}]/g, '');
            const ok = !timeout && (ua === q.answer || norm(ua) === norm(q.answer) || norm(ua).includes(norm(q.answer)));
            if (ok) {
                currentScore += q.score || 10;
            } else {
                saveError(q.question, ua || (timeout ? '(超时未答)' : ''), q.answer, q);
            }
            const fb = document.getElementById('fb');
            const nb = document.getElementById('nb');
            const qc = document.getElementById('qc');
            if (fb) {
                fb.classList.add('on', ok ? 'ok' : 'no');
                fb.innerHTML = ok ? '✅ 正确！+' + (q.score || 10) + '分' : '❌ ' + (timeout ? '超时' : '错误') + '<div class="ca">正确答案：' + q.answer + '</div>';
            }
            if (qc) {
                qc.classList.add(ok ? 'qc-ok' : 'qc-no');
                if (!ok) qc.classList.add('shake');
            }
            if (nb) nb.style.display = 'block';
        }


        function submitS(timeout) {
            clearTimer();
            const inp = document.getElementById('ai');
            const ua = inp ? inp.value.trim() : '';
            const q = currentQuestions[currentQuestionIndex];
            const ans = q.answer.replace(/[，。？！、；：""''【】《》（）\s]/g, '');
            const user = ua.replace(/[，。？！、；：""''【】《》（）\s]/g, '');
            const ok = !timeout && (ua === q.answer || user === ans || (ua.length >= 4 && ans.indexOf(user) !== -1));
            if (ok) {
                currentScore += q.score || 10;
            } else {
                saveError(q.question, ua || (timeout ? '(超时未答)' : ''), q.answer, q);
            }
            const fb = document.getElementById('fb');
            const nb = document.getElementById('nb');
            const qc = document.getElementById('qc');
            if (fb) {
                fb.classList.add('on', ok ? 'ok' : 'no');
                fb.innerHTML = ok ? '✅ 正确！+' + (q.score || 10) + '分' : '❌ ' + (timeout ? '超时' : '错误') + '<div class="ca">正确答案：' + q.answer + '</div>';
            }
            if (qc) {
                qc.classList.add(ok ? 'qc-ok' : 'qc-no');
                if (!ok) qc.classList.add('shake');
            }
            if (nb) nb.style.display = 'block';
        }

        function submitO(idx, timeout) {
            clearTimer();
            const q = currentQuestions[currentQuestionIndex];
            const ok = !timeout && idx === q.answer;
            const btns = document.querySelectorAll('.opt-btn');
            for (let i = 0; i < btns.length; i++) {
                if (i === q.answer) btns[i].classList.add('ri');
                if (i === idx && !ok) btns[i].classList.add('wr');
            }
            if (ok) {
                currentScore += q.score || 10;
            } else {
                const userPick = (idx >= 0 && q.options && q.options[idx]) ? q.options[idx] : (timeout ? '(超时未答)' : '(未选择)');
                saveError(q.question, userPick, q.options[q.answer], q);
            }
            const fb = document.getElementById('fb');
            const nb = document.getElementById('nb');
            const qc = document.getElementById('qc');
            if (fb) {
                fb.classList.add('on', ok ? 'ok' : 'no');
                fb.innerHTML = ok ? '✅ 正确！+' + (q.score || 10) + '分' : '❌ ' + (timeout ? '超时' : '错误') + '<div class="ca">正确答案：' + q.options[q.answer] + '</div>';
            }
            if (qc) {
                qc.classList.add(ok ? 'qc-ok' : 'qc-no');
                if (!ok) qc.classList.add('shake');
            }
            if (nb) nb.style.display = 'block';
        }

        function pickG(i) {
            const cells = document.querySelectorAll('.gc');
            const gridChars = window._gridChars;
            const gridPicked = window._gridPicked;
            if (cells[i].classList.contains('pk')) {
                cells[i].classList.remove('pk');
                const idx = gridPicked.indexOf(i);
                if (idx > -1) gridPicked.splice(idx, 1);
            } else {
                cells[i].classList.add('pk');
                gridPicked.push(i);
            }
            const gpv = document.getElementById('gpv');
            if (gpv) {
                gpv.textContent = gridPicked.map(j => gridChars[j]).join('');
            }
            if (gridPicked.length === window._gridAns.length) {
                setTimeout(submitG, 300);
            }
        }

        function clearG() {
            window._gridPicked = [];
            document.querySelectorAll('.gc.pk').forEach(c => c.classList.remove('pk'));
            const gpv = document.getElementById('gpv');
            if (gpv) gpv.textContent = '';
        }

        function submitG(timeout) {
            const q = currentQuestions[currentQuestionIndex];
            const sel = window._gridPicked.map(j => window._gridChars[j]).join('');
            const ok = !timeout && sel === q.answer;
            document.querySelectorAll('.gc.pk').forEach(c => c.classList.add(ok ? 'ri' : 'wr'));
            showAnswerFeedback(ok, q.answer, timeout);
            if (!ok) {
                saveError(q.question, sel || (timeout ? '(超时未答)' : '(未选择)'), q.answer, q);
            }
            if (ok) {
                currentScore += q.score || 10;
            }
        }

        function showAnswerFeedback(ok, answer, timeout) {
            stopTimer();
            const fb = document.getElementById('fb');
            const nb = document.getElementById('nb');
            const qc = document.getElementById('qc');
            if (fb) {
                fb.classList.add('on', ok ? 'ok' : 'no');
                fb.innerHTML = ok ? '✅ 正确！+' + (currentQuestions[currentQuestionIndex].score || 10) + '分' : '❌ ' + (timeout ? '超时' : '错误') + '<div class="ca">正确答案：' + answer + '</div>';
            }
            if (qc) {
                qc.classList.add(ok ? 'qc-ok' : 'qc-no');
                if (!ok) qc.classList.add('shake');
            }
            if (nb) nb.style.display = 'block';
            if (currentQuestionIndex % 8 === 7 && currentQuestionIndex < 37) {
                const nextPlayer = (Math.floor(currentQuestionIndex / 8) + 1) % 4 + 1;
                setTimeout(() => alert('第 ' + (currentQuestionIndex + 1) + ' 题完成 · ' + nextPlayer + '号选手上场'), 100);
            }
        }

        function showErrorPage() {
            showErrorBook();
        }

        document.addEventListener('keydown', function(e) {
            if (e.key >= '1' && e.key <= '4') {
                var idx = parseInt(e.key) - 1;
                var buttons = document.querySelectorAll('.opt-btn');
                if (buttons[idx]) buttons[idx].click();
            }
            if (e.key === ' ' || e.key === 'Enter') {
                var fhlPage = document.getElementById('fhl');
                if (fhlPage && fhlPage.classList.contains('on')) {
                    e.preventDefault();
                    fhlCheck();
                }
            }
        });

        // ---- PWA install guide ----
        var deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            var btn = document.getElementById('ib-btn');
            if (btn) btn.style.display = 'block';
        });

        window.installApp = function() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function(r) { deferredPrompt = null; });
            }
        };

        window.dismissInstall = function() {
            document.getElementById('install-banner').classList.remove('on');
            try { localStorage.setItem('pq_install_dismissed', '1'); } catch(e) {}
        };

        (function showInstallGuide() {
            try {
                if (localStorage.getItem('pq_install_dismissed')) return;
            } catch(e) {}
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            var isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
            if (isStandalone) return;
            var banner = document.getElementById('install-banner');
            var steps = document.getElementById('ib-steps');
            if (!banner || !steps) return;
            if (isIOS) {
                document.getElementById('ib-title').textContent = '📱 添加到主屏幕';
                steps.innerHTML = '<span>1</span> 点底部 <b>分享按钮</b><br><span>2</span> 滑动找到 <b>「添加到主屏幕」</b><br><span>3</span> 点右上角「添加」';
            } else {
                document.getElementById('ib-title').textContent = '📱 像 App 一样使用';
                steps.innerHTML = '<span>1</span> 点浏览器菜单 <b>⋮</b><br><span>2</span> 点 <b>「添加到主屏幕」</b><br><span>3</span> 桌面点图标即开';
            }
            banner.classList.add('on');
        })();

        // PWA service worker registration (silently skip if not supported or file:// protocol)
        if ('serviceWorker' in navigator) {
            try { navigator.serviceWorker.register('sw.js').catch(function(){}); } catch(e) {}
        }

    </script>
</body>
</html>
